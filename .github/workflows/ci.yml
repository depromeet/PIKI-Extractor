# PIKI-Server 의 ci.yml 과 같은 구조를 따르되, 이 서비스는 DB 가 없어 Testcontainers/Docker 없이 test 까지 그냥 돈다.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # E2E(*E2ETest)는 @Disabled/@EnabledIfEnvironmentVariable 로 격리돼 CI 에선 스킵된다 (TestConventionTest 가 강제).
      - name: Build and test
        run: ./gradlew build --no-daemon